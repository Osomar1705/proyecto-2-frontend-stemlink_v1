<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#071026" />
    <meta name="description" content="STEM Link conecta estudiantes con mentores especializados en ciencia y tecnología." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Outfit:wght@500;600;700;800&amp;display=swap" rel="stylesheet" />
    <title>STEM Link | Mentoría especializada</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme')
          var dark = stored ? stored === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches
          if (dark) document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
